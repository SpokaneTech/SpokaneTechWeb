name: Static Code Analysis (ruff)

on:
  push:
    branches-ignore:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: "ruff"
    steps:
      - name: actions_python_ruff
        uses: davidslusser/actions_python_ruff@v1.0.3
        with:
            src: "src/django_project"
            options: "-v"
            python_version: "3.11"
